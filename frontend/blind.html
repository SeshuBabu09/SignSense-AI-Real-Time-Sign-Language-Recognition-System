<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blind Mode ↔ Deaf Mode Bridge</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2c;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:rgba(255,255,255,.09);
      --shadow:0 12px 28px rgba(0,0,0,.35);
      --radius:18px;
      --accent:rgba(96,165,250,.22);
      --accentBorder:rgba(96,165,250,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96,165,250,.12), transparent 60%),
                  radial-gradient(900px 500px at 90% 30%, rgba(34,197,94,.12), transparent 60%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    header{
      padding:18px 22px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px}
    .pill{
      font-size:12px;color:var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;border-radius:999px;
      background: rgba(255,255,255,.04);
    }
    main{padding:18px 22px 30px;max-width:1200px;margin:0 auto}
    .grid{display:grid;grid-template-columns: 1.1fr .9fr;gap:16px}
    @media (max-width: 980px){.grid{grid-template-columns:1fr}}

    .card{
      background: rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card header{border:0;padding:14px 16px;background: rgba(0,0,0,.18)}
    .card h2{margin:0;font-size:14px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .content{padding:16px}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      cursor:pointer;border:1px solid var(--border);border-radius: 12px;
      padding:11px 14px;font-weight:800;background: rgba(255,255,255,.08);
      color:var(--text);transition:.15s transform, .15s opacity;user-select:none;
    }
    button:hover{transform: translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .primary{background: rgba(34,197,94,.18);border-color: rgba(34,197,94,.35)}
    .secondary{background: rgba(96,165,250,.18);border-color: rgba(96,165,250,.35)}
    .danger{background: rgba(239,68,68,.18);border-color: rgba(239,68,68,.35)}

    .hint{color:var(--muted);font-size:13px;line-height:1.45;margin-top:10px}
    .log{
      margin-top:14px;border-radius: 14px;border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      padding:12px;min-height:150px;max-height:260px;overflow:auto;
      font-family: ui-monospace, Menlo, Consolas, monospace;font-size:12.5px;line-height:1.5
    }
    .log .t{color:#a7f3d0}
    .log .s{color:#93c5fd}
    .log .e{color:#fecaca}

    .signStage{display:flex;flex-direction:column;gap:10px}
    .signTitle{font-weight:900;font-size:16px}
    .signBox{
      height:310px;border-radius: 18px;
      border:1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
      position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .badge{
      position:absolute;top:12px;right:12px;
      font-size:12px;color:var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;border-radius:999px;
      background: rgba(255,255,255,.04);z-index:5
    }
    video{
      width:100%;height:100%;
      object-fit:cover;
      display:none;
      background:#000;
    }
    .fallback{
      font-size:86px;
      display:flex;align-items:center;justify-content:center;
      width:100%;height:100%;
    }

    .menu{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;margin-top:14px;
    }
    .signBtn{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:14px;
      background: rgba(0,0,0,.18);
      border:1px solid var(--border);
      cursor:pointer;
      transition:.12s transform, .12s background;
    }
    .signBtn:hover{transform: translateY(-1px);background: rgba(255,255,255,.06)}
    .thumb{
      width:44px;height:44px;border-radius:12px;
      background: var(--accent);
      border:1px solid var(--accentBorder);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:900;
    }
    .label{font-size:13px;font-weight:900}
    .small{font-size:12px;color:var(--muted);font-weight:700}
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <span style="font-size:20px">🧑‍🦯</span>
      <div>Blind Mode ↔ Deaf Mode Bridge</div>
      <span class="pill">Voice → Sign Video Output</span>
    </div>
    <div class="pill" id="statusPill">Status: Idle</div>
  </header>

  <main>
    <div class="grid">

      <!-- LEFT: Blind Voice -->
      <section class="card">
        <header><h2>🎤 Blind Voice Assistant</h2></header>
        <div class="content">
          <div class="row">
            <button class="primary" id="btnStart">🎤 Start Listening</button>
            <button class="danger" id="btnStop" disabled>⏹ Stop</button>
            <button class="secondary" id="btnTest">🧪 Test</button>
            <button id="btnClear">🧹 Clear Logs</button>
          </div>

          <div class="hint">
            Say: <b>show sign hello</b>, <b>help</b>, <b>emergency</b>, <b>bathroom</b>
          </div>

          <div class="log" id="logBox"></div>
        </div>
      </section>

      <!-- RIGHT: Deaf Sign Video -->
      <section class="card">
        <header><h2>🤟 Deaf Sign Output</h2></header>
        <div class="content">
          <div class="signStage">
            <div class="signTitle" id="signTitle">Waiting for voice…</div>

            <div class="signBox">
              <div class="badge" id="signBadge">No sign</div>
              <video id="signVideo" autoplay muted loop playsinline></video>
              <div class="fallback" id="signFallback">🤍</div>
            </div>
          </div>

          <div class="hint">Tap sign OR speak voice:</div>
          <div class="menu" id="signMenu"></div>
        </div>
      </section>

    </div>
  </main>

  <script src="blind.js"></script>
</body>
</html>
